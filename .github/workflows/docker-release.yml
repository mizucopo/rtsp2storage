name: Docker Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docker-release-main
  cancel-in-progress: false

env:
  IMAGE_REPOSITORY: mizucopo/rtsp2storage
  DOCKERHUB_USERNAME: mizucopo
  DOCKERHUB_URL: https://hub.docker.com/r/mizucopo/rtsp2storage

jobs:
  docker-release:
    runs-on: ubuntu-latest
    steps:
      - name: Require main
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "This workflow can only release from main." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        run: scripts/resolve-release-version.sh

      - name: Configure Git
        env:
          GIT_USER_NAME: "mizu"
          GIT_USER_EMAIL: "mizu.copo@gmail.com"
        run: |
          git config user.name "${GIT_USER_NAME}"
          git config user.email "${GIT_USER_EMAIL}"

      - name: Inspect existing git tag and release
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          set -euo pipefail

          git fetch --force --tags

          tag_exists=false
          release_exists=false

          if git rev-parse --verify --quiet "refs/tags/${RELEASE_TAG}" >/dev/null; then
            tag_exists=true
            tag_commit="$(git rev-list -n 1 "${RELEASE_TAG}")"

            if [ "${tag_commit}" != "${GITHUB_SHA}" ]; then
              echo "Tag ${RELEASE_TAG} already exists at ${tag_commit}, not ${GITHUB_SHA}." >&2
              exit 1
            fi
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            release_exists=true
          fi

          if [ "${release_exists}" = "true" ] && [ "${tag_exists}" != "true" ]; then
            echo "Release ${RELEASE_TAG} exists, but the matching git tag was not found." >&2
            exit 1
          fi

          {
            echo "tag_exists=${tag_exists}"
            echo "release_exists=${release_exists}"
          } >> "${GITHUB_OUTPUT}"

      - name: Stop if release already exists
        if: steps.existing.outputs.tag_exists == 'true' && steps.existing.outputs.release_exists == 'true'
        env:
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: echo "Release ${RELEASE_TAG} already exists for this commit."

      - name: Login to Docker Hub
        if: steps.existing.outputs.tag_exists != 'true' || steps.existing.outputs.release_exists != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Create missing release for existing tag
        if: steps.existing.outputs.tag_exists == 'true' && steps.existing.outputs.release_exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE: ${{ steps.version.outputs.image }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          set -euo pipefail

          docker manifest inspect "${IMAGE}" >/dev/null

          {
            echo "## Docker Image"
            echo
            echo "Pull the Docker image:"
            echo
            echo "    docker pull ${IMAGE}"
            echo
            echo "Or use the latest tag:"
            echo
            echo "    docker pull ${IMAGE_REPOSITORY}:latest"
            echo
            echo "## Links"
            echo
            echo "- [Docker Hub](${DOCKERHUB_URL})"
            echo "- [Source Code](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/tree/${RELEASE_TAG})"
          } > release-notes.md

          gh release create "${RELEASE_TAG}" \
            --title "Release ${RELEASE_TAG}" \
            --notes-file release-notes.md

      - name: Check Docker Hub tag
        if: steps.existing.outputs.tag_exists != 'true'
        env:
          IMAGE: ${{ steps.version.outputs.image }}
        run: |
          set -euo pipefail

          inspect_output="$(docker manifest inspect "${IMAGE}" 2>&1)" && inspect_status=0 || inspect_status=$?

          if [ "${inspect_status}" -eq 0 ]; then
            echo "Docker image tag already exists: ${IMAGE}" >&2
            exit 1
          fi

          if printf '%s' "${inspect_output}" | grep -Eq 'no such manifest|manifest unknown'; then
            echo "Docker image tag is available: ${IMAGE}"
            exit 0
          fi

          echo "Could not inspect Docker Hub tag: ${IMAGE}" >&2
          printf '%s\n' "${inspect_output}" >&2
          exit "${inspect_status}"

      - name: Set up Docker Buildx
        if: steps.existing.outputs.tag_exists != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.existing.outputs.tag_exists != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:latest
            ${{ steps.version.outputs.image }}

      - name: Create and push git tag
        if: steps.existing.outputs.tag_exists != 'true'
        env:
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          set -euo pipefail

          git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Create GitHub Release
        if: steps.existing.outputs.tag_exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE: ${{ steps.version.outputs.image }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          set -euo pipefail

          {
            echo "## Docker Image"
            echo
            echo "Pull the Docker image:"
            echo
            echo "    docker pull ${IMAGE}"
            echo
            echo "Or use the latest tag:"
            echo
            echo "    docker pull ${IMAGE_REPOSITORY}:latest"
            echo
            echo "## Links"
            echo
            echo "- [Docker Hub](${DOCKERHUB_URL})"
            echo "- [Source Code](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/tree/${RELEASE_TAG})"
          } > release-notes.md

          gh release create "${RELEASE_TAG}" \
            --title "Release ${RELEASE_TAG}" \
            --notes-file release-notes.md
