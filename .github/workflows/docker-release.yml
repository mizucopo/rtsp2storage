name: Docker Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  docker-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read version
        id: version
        run: |
          echo "version=$(cat version)" >> "$GITHUB_OUTPUT"

      - name: Configure Git
        env:
          GIT_USER_NAME: "mizu"
          GIT_USER_EMAIL: "mizu.copo@gmail.com"
        run: |
          git config user.name "$GIT_USER_NAME"
          git config user.email "$GIT_USER_EMAIL"

      - name: Check if tag exists
        run: |
          git fetch --tags
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: mizucopo
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            mizucopo/rtsp2storage:latest
            mizucopo/rtsp2storage:${{ steps.version.outputs.version }}

      - name: Create and push git tag
        run: |
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "Release ${{ steps.version.outputs.version }}" \
            --notes "## Docker Image

          Pull the Docker image:

          \`\`\`bash
          docker pull mizucopo/rtsp2storage:${{ steps.version.outputs.version }}
          \`\`\`

          Or use the latest tag:

          \`\`\`bash
          docker pull mizucopo/rtsp2storage:latest
          \`\`\`

          ## Links:
          - [Docker Hub](https://hub.docker.com/r/mizucopo/rtsp2storage)
          - [Source Code](${{ github.server_url }}/${{ github.repository }}/tree/${{ steps.version.outputs.version }})
          "
