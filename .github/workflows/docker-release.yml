name: Docker Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docker-release-main
  cancel-in-progress: false

env:
  IMAGE_REPOSITORY: mizucopo/rtsp2storage
  DOCKERHUB_USERNAME: mizucopo
  DOCKERHUB_URL: https://hub.docker.com/r/mizucopo/rtsp2storage

jobs:
  docker-release:
    runs-on: ubuntu-latest
    steps:
      - name: Require main
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "This workflow can only release from main." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        run: scripts/resolve-release-version.sh

      - name: Inspect existing git tag
        id: tag
        env:
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          set -euo pipefail

          git fetch --force --tags

          tag_exists=false

          if git rev-parse --verify --quiet "refs/tags/${RELEASE_TAG}" >/dev/null; then
            tag_exists=true
            tag_commit="$(git rev-list -n 1 "${RELEASE_TAG}")"

            if [ "${tag_commit}" != "${GITHUB_SHA}" ]; then
              echo "Tag ${RELEASE_TAG} already exists at ${tag_commit}, not ${GITHUB_SHA}." >&2
              exit 1
            fi
          fi

          echo "exists=${tag_exists}" >> "${GITHUB_OUTPUT}"

      - name: Check GitHub Release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: scripts/check-github-release.sh

      - name: Check Docker Hub tag
        id: image
        env:
          IMAGE: ${{ steps.version.outputs.image }}
        run: scripts/check-docker-hub-tag.sh

      - name: Check Docker Hub latest tag
        id: latest
        env:
          IMAGE: ${{ env.IMAGE_REPOSITORY }}:latest
        run: scripts/check-docker-hub-tag.sh

      - name: Resolve release state
        id: state
        env:
          LATEST_IMAGE_DIGEST: ${{ steps.latest.outputs.digest }}
          LATEST_IMAGE_EXISTS: ${{ steps.latest.outputs.exists }}
          RELEASE_EXISTS: ${{ steps.release.outputs.exists }}
          TAG_EXISTS: ${{ steps.tag.outputs.exists }}
          VERSION_IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
          VERSION_IMAGE_EXISTS: ${{ steps.image.outputs.exists }}
        run: scripts/resolve-docker-release-state.sh

      - name: Stop if release already exists
        if: steps.state.outputs.release_complete == 'true'
        env:
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: echo "Release ${RELEASE_TAG} already exists for this commit."

      - name: Login to Docker Hub
        if: steps.state.outputs.publish_version_image == 'true' || steps.state.outputs.repair_latest == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Configure Git
        if: steps.state.outputs.create_tag == 'true'
        env:
          GIT_USER_NAME: "mizu"
          GIT_USER_EMAIL: mizu.copo@gmail.com
        run: |
          git config user.name "${GIT_USER_NAME}"
          git config user.email "${GIT_USER_EMAIL}"

      - name: Create and push git tag
        if: steps.state.outputs.create_tag == 'true'
        env:
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          set -euo pipefail

          git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Set up Docker Buildx
        if: steps.state.outputs.publish_version_image == 'true' || steps.state.outputs.repair_latest == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        if: steps.state.outputs.publish_version_image == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:latest
            ${{ steps.version.outputs.image }}

      - name: Repair Docker Hub latest tag
        if: steps.state.outputs.repair_latest == 'true'
        env:
          IMAGE: ${{ steps.version.outputs.image }}
        run: |
          set -euo pipefail

          docker buildx imagetools create \
            --tag "${IMAGE_REPOSITORY}:latest" \
            "${IMAGE}"

      - name: Create GitHub Release
        if: steps.state.outputs.create_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE: ${{ steps.version.outputs.image }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          set -euo pipefail

          {
            echo "## Docker Image"
            echo
            echo "Pull the Docker image:"
            echo
            echo "    docker pull ${IMAGE}"
            echo
            echo "Or use the latest tag:"
            echo
            echo "    docker pull ${IMAGE_REPOSITORY}:latest"
            echo
            echo "## Links"
            echo
            echo "- [Docker Hub](${DOCKERHUB_URL})"
            echo "- [Source Code](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/tree/${RELEASE_TAG})"
          } > release-notes.md

          gh release create "${RELEASE_TAG}" \
            --title "Release ${RELEASE_TAG}" \
            --notes-file release-notes.md
